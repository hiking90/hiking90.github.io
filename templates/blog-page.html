{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock title %}

{% block content %}
<article class="blog-post">
    <header>
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date }}">{{ page.date | date(format="%B %e, %Y") }}</time>
    </header>
    <div class="blog-content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
